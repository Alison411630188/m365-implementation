<!doctype html>
<html lang="zh-TW">

  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>M365 導入專案</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      (function() {
        const endpoint = "%VITE_ANALYTICS_ENDPOINT%";
        const id = "%VITE_ANALYTICS_WEBSITE_ID%";
        if (endpoint && !endpoint.startsWith('%') && id && !id.startsWith('%')) {
          const script = document.createElement('script');
          script.async = true;
          script.defer = true;
          script.src = endpoint + '/umami';
          script.setAttribute('data-website-id', id);
          document.head.appendChild(script);
        }
      })();
    </script>
  </body>

</html>
